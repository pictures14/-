<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유저 목록 (실시간 공유)</title>
<style>
  body { background:#0a0a0a; color:white; text-align:center; font-family:sans-serif; margin: 0; padding-top: 60px; }
  .top-buttons { position:fixed; top:20px; right:20px; display: flex; gap: 10px; z-index: 100; }
  .home-btn { padding:8px 12px; background:#333; color:white; border:1px solid #555; cursor:pointer; border-radius:5px; font-weight:bold; transition: 0.3s; }
  .home-btn:hover { background: #444; border-color: #ffd700; }
  .logout { padding:8px 12px; background:#ffd700; border:none; cursor:pointer; border-radius:5px; font-weight:bold; color:black; }
  input { margin:5px; padding:10px; border-radius:5px; border:none; background:#1c1c1c; color:white; }
  table { margin:30px auto; border-collapse:collapse; width:90%; max-width:800px; }
  th, td { border:1px solid #444; padding:12px; }
  th { background:#222; color:#ffd700; }
  tr:nth-child(even) { background:#161616; }
  .add-btn { padding:10px 20px; background:#ffd700; border:none; cursor:pointer; font-weight:bold; border-radius:5px; color: black; }
  .del-btn { background:#ff4d4d; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:5px; }
  a { color: #ffd700; text-decoration: none; font-weight: bold; }
</style>
</head>
<body>

<div class="top-buttons">
  <button class="home-btn" onclick="location.href='./index.html'">홈으로</button>
  <button class="logout" onclick="logout()">로그아웃</button>
</div>

<h1>🔥 실시간 유저 티어 목록</h1>

<div id="adminForm">
  <input id="name" placeholder="닉네임">
  <input id="snipe" placeholder="스나">
  <input id="rifle" placeholder="라플">
  <input id="profile" placeholder="병영 링크">
  <button class="add-btn" onclick="addUser()">추가</button>
</div>

<table>
  <thead>
    <tr>
      <th>닉네임</th><th>스나</th><th>라플</th><th>병영</th><th id="adminHeader" style="display:none;">관리</th>
    </tr>
  </thead>
  <tbody id="list"></tbody>
</table>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCFrDJYL8NlnmL1uJ6rxb75gnBRqI020G8",
    authDomain: "yuns-22255.firebaseapp.com",
    projectId: "yuns-22255",
    storageBucket: "yuns-22255.firebasestorage.app",
    messagingSenderId: "252460409607",
    appId: "1:252460409607:web:b93478e92b85c6f4749ba2",
    measurementId: "G-83TCLDNDFC"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const usersCol = collection(db, "users");

  const role = localStorage.getItem("role");
  if (localStorage.getItem("login") !== "true") window.location.replace("./login.html");

  if (role === "admin") {
    document.getElementById("adminHeader").style.display = "";
  } else {
    document.getElementById("adminForm").style.display = "none";
  }

  window.addUser = async () => {
    const nameVal = document.getElementById("name").value;
    if (!nameVal) return alert("닉네임을 입력하세요!");
    await addDoc(usersCol, {
      name: nameVal,
      snipe: document.getElementById("snipe").value,
      rifle: document.getElementById("rifle").value,
      profile: document.getElementById("profile").value,
      timestamp: Date.now()
    });
    document.querySelectorAll("#adminForm input").forEach(input => input.value = "");
  };

  const q = query(usersCol, orderBy("timestamp", "desc"));
  onSnapshot(q, (snapshot) => {
    let html = "";
    snapshot.forEach((doc) => {
      const u = doc.data();
      const id = doc.id;
      const link = u.profile.startsWith('http') ? u.profile : 'https://' + u.profile;
      html += `<tr>
        <td>${u.name}</td><td>${u.snipe}</td><td>${u.rifle}</td>
        <td><a href="${link}" target="_blank">보기</a></td>
        ${role === 'admin' ? `<td><button class="del-btn" onclick="deleteUser('${id}')">삭제</button></td>` : ""}
      </tr>`;
    });
    document.getElementById("list").innerHTML = html;
  });

  window.deleteUser = async (id) => {
    if (confirm("삭제하시겠습니까?")) await deleteDoc(doc(db, "users", id));
  };

  window.logout = () => {
    localStorage.removeItem("login");
    localStorage.removeItem("role");
    window.location.replace("./login.html");
  };
</script>
</body>
</html>
